<div class="mb-3">
    <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
    {{ field }}
    {% if field.help_text %}
        <div class="form-text soft-text">{{ field.help_text }}</div>
    {% endif %}
    {% for error in field.errors %}
        <div class="text-danger small">{{ error }}</div>
    {% endfor %}
</div>
